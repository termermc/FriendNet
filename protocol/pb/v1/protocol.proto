syntax = "proto3";

option go_package = "friendnet.org/protocol";

package pb.v1;

// Types of protocol messages
enum MsgType {
    // Do not use.
    MSG_TYPE_UNSPECIFIED = 0;

    // [C2S, S2C, C2C] A ping message.
    // May be sent by either the client or server, but the other must respond with MSG_TYPE_PONG.
    // Must be responded to with MSG_TYPE_PONG, or the connection will be terminated.
    // Either side may have its own arbitrary timeout which may cause disconnection if not met.
    // Expected: Message MSG_TYPE_PONG.
    MSG_TYPE_PING = 1;

    // [C2S, S2C, C2C] Response to MSG_TYPE_PING.
    MSG_TYPE_PONG = 2;

    // [C2S, S2C, C2C] Acknowledgement of success.
    // Sent as a reply to other messages.
    MSG_TYPE_ACKNOWLEDGED = 3;

    // [C2S, S2C, C2C] An error message.
    // Sent as a reply to other messages.
    MSG_TYPE_ERROR = 4;

    // [C2S] Initial client version negotiation.
    MSG_TYPE_VERSION = 5;

    // [S2C] Indicates that the server accepted the client's protocol version.
    MSG_TYPE_VERSION_ACCEPTED = 6;

    // [S2C] Indicates that the server rejected the client's protocol version.
    MSG_TYPE_VERSION_REJECTED = 7;

    // [C2S] Initial client authentication with the server.
    MSG_TYPE_AUTHENTICATE = 8;

    // [S2C] Indicates that client authentication was accepted.
    MSG_TYPE_AUTH_ACCEPTED = 9;

    // [S2C] Indicates that client authentication was denied.
    MSG_TYPE_AUTH_REJECTED = 10;

    // [C2S] Request to open an outbound proxy to a connected peer.
    // The server will cancel the stream with an error if the target peer could not be contacted.
    // If successful, the stream will be converted to a proxied stream to the target peer.
    MSG_TYPE_OPEN_OUTBOUND_PROXY = 11;

    // [S2C] Notification of a new inbound proxy stream from another peer.
    // The client can choose to cancel the stream or send data on it.
    // All data after the notification message comes from the origin peer.
    MSG_TYPE_INBOUND_PROXY = 12;

    // [C2C] Request to get files inside a user's directory.
    // Expected: Either:
    //  - Repeated message MSG_TYPE_DIR_FILES until stream is closed by receiver.
    //  - Message MSG_TYPE_ERROR of ERR_TYPE_FILE_NOT_EXIST.
    MSG_TYPE_GET_DIR_FILES = 13;

    // [C2C] A possibly non-exhaustive list of files in a directory.
    MSG_TYPE_DIR_FILES = 14;

    // [C2C] Request to get metadata about a file without reading it.
    // Expected: Either:
    //  - Message MSG_TYPE_FILE_META.
    //  - Message MSG_TYPE_ERROR of ERR_TYPE_FILE_NOT_EXIST.
    MSG_TYPE_GET_FILE_META = 15;

    // [C2C] Metadata about a file, including its size.
    MSG_TYPE_FILE_META = 16;

    // [C2C] Request to get a file's metadata and contents.
    // Expected: Either:
    //  - Message MSG_TYPE_FILE_META then the file's requested binary content until the stream is closed by receiver.
    //    If the file is a directory, the size will be zero and no content will be sent.
    //  - Message MSG_TYPE_ERROR of ERR_TYPE_FILE_NOT_EXIST.
    MSG_TYPE_GET_FILE = 17;

    // [C2S] Request to get a list of online users in the room.
    // Expected: Repeated message MSG_TYPE_ONLINE_USERS until stream is closed by receiver.
    MSG_TYPE_GET_ONLINE_USERS = 18;

    // [S2C] List of online users in the room.
    MSG_TYPE_ONLINE_USERS = 19;

    // [C2S] Notification to let the server know the client is disconnecting.
    // The client must not communicate with the server after sending this message.
    // Expected: Message MSG_TYPE_ACKNOWLEDGED.
    MSG_TYPE_BYE = 20;

    // [C2S] Advertises a connection method for clients to direct connect to the sender.
    // Expected: Message MSG_TYPE_ADVERTISE_CONN_METHOD_RESULT.
    MSG_TYPE_ADVERTISE_CONN_METHOD = 21;

    // [S2C] The result of the server attempting to direct connect to a client.
    MSG_TYPE_ADVERTISE_CONN_METHOD_RESULT = 22;

    // [C2S] Requests removal of a previously advertised direct connect method.
    // If the method was already removed or never existed, it does nothing.
    // Expected: Message MSG_TYPE_ACKNOWLEDGED.
    MSG_TYPE_REMOVE_CONN_METHOD = 23;

    // [C2C] Requests another client to connect to the sender.
    // Typically used to establish a direct connection for future C2C messages.
    // The client should reply only after a connection attempt succeeds or fails.
    // Expected: Message MSG_TYPE_DIRECT_CONN_RESULT.
    MSG_TYPE_CONNECT_TO_ME = 24;

    // [C2C] The result of a client attempting to direct connect to another client.
    MSG_TYPE_DIRECT_CONN_RESULT = 25;

    // [C2S] Requests the client's public IP.
    // Expected: Message MSG_TYPE_PUBLIC_IP.
    MSG_TYPE_GET_PUBLIC_IP = 26;

    // [S2C] A client's public IP information.
    MSG_TYPE_PUBLIC_IP = 27;

    // [C2S] Requests an online client's advertised connection methods.
    // Expected: Either:
    //  - Message CLIENT_CONN_METHODS.
    //  - Message MSG_TYPE_ERROR of ERR_TYPE_CLIENT_NOT_ONLINE if the client is not online.
    MSG_TYPE_GET_CLIENT_CONN_METHODS = 28;

    // [S2C] Connection methods for an online client.
    MSG_TYPE_CLIENT_CONN_METHODS = 29;

    // [C2S] Requests a token to be used for a direct connect handshake with another client.
    // Expected: Message MSG_TYPE_DIRECT_CONN_HANDSHAKE_TOKEN.
    // TODO Include the room and origin and target in the token so that it cannot be stolen by the recipient and used to impersonate the sender.
    // TODO Token must be only able to be used once and have an expiration built-in.
    // TODO The token should probably be an encrypted value, and uses should be stored temporarily in-memory.
    // TODO That will prevent creating a million different tokens without using them.
    // TODO Disallow creating a token whose sender is self.
    MSG_TYPE_GET_DIRECT_CONN_HANDSHAKE_TOKEN = 30;

    // [S2C] A direct connect handshake token.
    MSG_TYPE_DIRECT_CONN_HANDSHAKE_TOKEN = 31;

    // [C2S] Requests redemption of a direct connect handshake token.
    // It is used to validate an incoming direct connect handshake.
    // Expected: Message MSG_TYPE_REDEEM_CONN_HANDSHAKE_TOKEN_RESULT.
    MSG_TYPE_REDEEM_CONN_HANDSHAKE_TOKEN = 32;

    // [S2C] Whether a direct connect handshake token was valid, and if so,
    // information about the client who sent the token.
    MSG_TYPE_REDEEM_CONN_HANDSHAKE_TOKEN_RESULT = 33;

    // [C2C, S2C] The handshake sent to direct connect to a client.
    // This is the first message that must be sent when direct connecting to a client.
    // Expected: Message MSG_TYPE_DIRECT_CONN_HANDSHAKE_RESULT, followed by disconnection if not successful.
    MSG_TYPE_DIRECT_CONN_HANDSHAKE = 34;

    // [C2C, C2S] The result of the direct connect handshake.
    MSG_TYPE_DIRECT_CONN_HANDSHAKE_RESULT = 35;

    // [C2S] Requests changing the client's account password.
    MSG_TYPE_CHANGE_ACCOUNT_PASSWORD = 36;
}

// Ping message.
message MsgPing {
    // The epoch millisecond timestamp when the message was sent.
    // Used to measure latency.
    int64 sent_ts = 1;
}

// Pong message.
message MsgPong {
    // The epoch millisecond timestamp when the message was sent.
    // Used to measure latency.
    int64 sent_ts = 1;
}

// Acknowledgement message.
// Empty.
message MsgAcknowledged {
}

// Types of errors that can be returned in protocol error messages.
enum ErrType {
    // Do not use.
    ERR_TYPE_UNSPECIFIED = 0;

    // An internal error occurred.
    ERR_TYPE_INTERNAL = 1;

    // An invalid message was received.
    ERR_TYPE_MALFORMED_MESSAGE = 2;

    // The message's payload exceeded the size limit.
    ERR_TYPE_PAYLOAD_TOO_LARGE = 3;

    // A required field was missing.
    ERR_TYPE_MISSING_FIELDS = 4;

    // An invalid field was received.
    ERR_TYPE_INVALID_FIELDS = 5;

    // A message was received, but its type was unexpected.
    ERR_TYPE_UNEXPECTED_MSG_TYPE = 6;

    // Requests were sent too quickly and the request was rate limited.
    ERR_TYPE_RATE_LIMITED = 7;

    // The file did not exist.
    ERR_TYPE_FILE_NOT_EXIST = 8;

    // Unimplemented functionality.
    ERR_TYPE_UNIMPLEMENTED = 9;

    // Permission denied.
    ERR_TYPE_PERMISSION_DENIED = 10;

    // A path did not point to a directory.
    ERR_TYPE_PATH_NOT_DIRECTORY = 11;

    // The client is not online.
    ERR_TYPE_CLIENT_NOT_ONLINE = 12;
}

// An error, usually sent by the server.
message MsgError {
    // The error type.
    ErrType type = 1;

    // The error message (optional).
    optional string message = 2;
}

// A protocol version.
message ProtoVersion {
    // The minor protocol version.
    // Major protocol versions can be considered complete overhauls or changes to the underlying message header format.
    uint32 major = 1;

    // The minor protocol version.
    // Minor protocol versions include breaking changes, but many parts of the protocol will remain the same between versions.
    uint32 minor = 2;

    // The patch protocol version.
    // Patch protocol versions may include some trivial small additions, but nothing breaking.
    uint32 patch = 3;
}

// Client protocol negotiation.
message MsgVersion {
    // The client's protocol version.
    ProtoVersion version = 1;
}

// Message sent by the server as a reply to PROTO_VERSION.
// If a client receives this message, it may continue the handshake process.
message MsgVersionAccepted {
    // The server's protocol version.
    ProtoVersion version = 1;
}

// Reasons for a client's version being rejected
enum VersionRejectionReason {
    // No reason specified.
    // More details may be in the rejection message.
    VERSION_REJECTION_REASON_UNSPECIFIED = 0;

    // The client's version is too old.
    VERSION_REJECTION_REASON_TOO_OLD = 2;

    // The client's version is too new.
    VERSION_REJECTION_REASON_TOO_NEW = 3;
}

// Message sent by the server as a reply to PROTO_VERSION.
// If a client receives this message, it will be disconnected and must connect with a suitable version.
message MsgVersionRejected {
    // The server's protocol version.
    ProtoVersion version = 1;

    // The reason the client's version was rejected.
    VersionRejectionReason reason = 2;

    // A message accompanying the rejection (optional).
    optional string message = 3;
}

// Client authentication.
// Should be the first message sent to the server immediately upon connection.
// It will be replied to with either PROTO_AUTH_ACCEPTED or PROTO_AUTH_REJECTED.
message MsgAuthenticate {
    // The room the user is trying to authenticate with.
    string room = 1;

    // The user's username.
    string username = 2;

    // The user's password.
    string password = 3;
}

// Message sent by the server as a reply to PROTO_AUTHENTICATE.
// If a client receives this message, it is considered to be authenticated and connected, and a session has been established.
message MsgAuthAccepted {
}

// Reasons for a client's authentication request being rejected.
enum AuthRejectionReason {
    // No reason specified.
    // More details may be in the rejection message.
    AUTH_REJECTION_REASON_UNSPECIFIED = 0;

    // The client provided invalid credentials (e.g. invalid token).
    AUTH_REJECTION_REASON_INVALID_CREDENTIALS = 2;

    // The user is banned and therefore not allowed to connect.
    AUTH_REJECTION_REASON_BANNED = 3;

    // A client with the same username is already connected.
    AUTH_REJECTION_REASON_ALREADY_CONNECTED = 4;
}

// Message sent by the server as a reply to PROTO_AUTHENTICATE.
// The client will be disconnected after receiving this message.
message MsgAuthRejected {
    // The reason the client's authentication request was rejected.
    AuthRejectionReason reason = 1;

    // A message accompanying the rejection (optional).
    optional string message = 2;
}

// See MSG_TYPE_OPEN_OUTBOUND_PROXY.
message MsgOpenOutboundProxy {
    // The target peer's username.
    string target_username = 1;
}

// See MSG_TYPE_INBOUND_PROXY.
message MsgInboundProxy {
    // The origin peer's username.
    string origin_username = 1;
}

// See MSG_TYPE_GET_DIR_FILES.
message MsgGetDirFiles {
    // The path of the directory within the share.
    // The path must begin with a `/`.
    string path = 1;
}

// See MSG_TYPE_DIR_FILES.
message MsgDirFiles {
    // A non-exhaustive list of files within a directory.
    repeated MsgFileMeta files = 1;
}

// See MSG_TYPE_GET_FILE_META.
message MsgGetFileMeta {
    // The path to the file.
    string path = 1;
}

// See MSG_TYPE_FILE_META.
message MsgFileMeta {
    // The file's name.
    string name = 1;

    // Whether the file is a directory.
    bool is_dir = 2;

    // The file's size, in bytes.
    // Always zero if the file is a folder.
    uint64 size = 3;
}

// See MSG_TYPE_GET_FILE.
message MsgGetFile {
    // The path to the file.
    string path = 1;

    // The offset into the file to read, in bytes.
    // Values above the file size will just result in no data being returned.
    uint64 offset = 2;

    // The limit of the file to read, in bytes.
    // Specify 0 for no limit.
    uint64 limit = 3;
}

// See MSG_TYPE_GET_ONLINE_USERS.
message MsgGetOnlineUsers {
}

// OnlineUserInfo is information about an online user.
message OnlineUserInfo {
    // The user's username.
    string username = 1;
}

// See MSG_TYPE_ONLINE_USERS.
message MsgOnlineUsers {
    // A list of online users in the room and their statuses.
    repeated OnlineUserInfo users = 1;
}

// See MSG_TYPE_BYE.
message MsgBye {
}

// ConnMethodType is an enum of possible direct connection types.
enum ConnMethodType {
    // Do not use.
    CONN_METHOD_TYPE_UNSPECIFIED = 0;

    // Direct IP connection.
    // Addresses are formatted as: IP:PORT
    CONN_METHOD_TYPE_IP = 1;

    // Yggdrasil connection.
    // Addresses are formatted as: YGGDRASIL_IP:PORT
    CONN_METHOD_TYPE_YGGDRASIL = 2;
}

// See MSG_TYPE_ADVERTISE_CONN_METHOD.
message MsgAdvertiseConnMethod {
    // The method type.
    ConnMethodType type = 1;

    // The method address.
    // The format is defined by the type.
    string address = 2;

    // The priority to assign to the method.
    // Higher means more preferred.
    // Negative numbers are allowed.
    int32 priority = 3;
}

// ConnResult is an enum of possible results of a direct connection attempt.
enum ConnResult {
    // Do not use.
    CONN_RESULT_UNSPECIFIED = 0;

    // Connection succeeded.
    CONN_RESULT_OK = 1;

    // An internal error occurred while attempting the connection.
    CONN_RESULT_INTERNAL_ERROR = 2;

    // Connection timed out.
    CONN_RESULT_TIMED_OUT = 3;

    // Connection was refused.
    CONN_RESULT_CONN_REFUSED = 4;

    // The connection method is not supported.
    CONN_RESULT_METHOD_NOT_SUPPORTED = 5;

    // A connection succeeded, but the handshake failed.
    CONN_RESULT_HANDSHAKE_FAILED = 6;
}

// See MSG_TYPE_ADVERTISE_CONN_METHOD_RESULT.
message MsgAdvertiseConnMethodResult {
    // The result.
    ConnResult result = 1;

    // The method ID assigned by the server.
    // This will be set even if result was not CONN_RESULT_OK.
    string id = 2;
}

// See MSG_TYPE_REMOVE_CONN_METHOD.
message MsgRemoveConnMethod {
    // The method ID.
    string id = 1;
}

// See MSG_TYPE_CONNECT_TO_ME.
message MsgConnectToMe {
}

// See MSG_TYPE_DIRECT_CONN_RESULT.
message MsgDirectConnResult {
    // The result.
    ConnResult result = 1;
}

// See MSG_TYPE_GET_PUBLIC_IP.
message MsgGetPublicIp {
}

// See MSG_TYPE_PUBLIC_IP.
message MsgPublicIp {
    // The client's public IP address, according to the server.
    string public_ip = 1;
}

// See MSG_TYPE_GET_CLIENT_CONN_METHODS.
message MsgGetClientConnMethods {
    // The client's username.
    string username = 1;
}

// ConnMethod is a direct connect method.
message ConnMethod {
    // The method ID.
    string id = 1;

    // The method type.
    ConnMethodType type = 2;

    // The method address.
    // The format is defined by the type.
    string address = 3;

    // The priority to assign to the method.
    // Higher means more preferred.
    // Negative numbers are allowed.
    int32 priority = 4;

    // Whether the connection method was verified to work by the server.
    bool is_server_verified = 5;
}

// See MSG_TYPE_CLIENT_CONN_METHODS.
message MsgClientConnMethods {
    // The client's advertised direct connect methods.
    repeated ConnMethod methods = 1;
}

// See MSG_TYPE_GET_DIRECT_CONN_HANDSHAKE_TOKEN.
message MsgGetDirectConnHandshakeToken {
    // The username of the client to connect to.
    string username = 1;
}

// See MSG_TYPE_DIRECT_CONN_HANDSHAKE_TOKEN.
message MsgDirectConnHandshakeToken {
    // The token.
    string token = 1;
}

// See MSG_TYPE_REDEEM_CONN_HANDSHAKE_TOKEN.
message MsgRedeemConnHandshakeToken {
    // The token to redeem.
    string token = 1;
}

// See MSG_TYPE_REDEEM_CONN_HANDSHAKE_TOKEN_RESULT.
message MsgRedeemConnHandshakeTokenResult {
    // Whether the token was valid.
    // If false, all other fields will be empty.
    bool is_valid = 1;

    // Whether the token sender is the server itself.
    // This is for testing direct connect methods.
    // If true, username and room will be empty.
    bool is_server = 2;

    // The token sender's username.
    string username = 3;

    // The token sender's room.
    string room = 4;
}

// See MSG_TYPE_DIRECT_CONN_HANDSHAKE.
message MsgDirectConnHandshake {
    // The token to authenticate the sender.
    string token = 1;
}

enum DirectConnHandshakeResult {
    // No reason specified.
    DIRECT_CONN_HANDSHAKE_RESULT_UNSPECIFIED = 0;

    // The handshake succeeded.
    DIRECT_CONN_HANDSHAKE_RESULT_OK = 1;

    // The sender's token was invalid.
    DIRECT_CONN_HANDSHAKE_RESULT_TOKEN_INVALID = 2;

    // The handshake failed due to an internal error.
    DIRECT_CONN_HANDSHAKE_RESULT_INTERNAL_ERROR = 3;

    // The sender's token was valid, but the client wants to close the connection anyway.
    DIRECT_CONN_HANDSHAKE_RESULT_KTHXBYE = 4;
}

// See MSG_TYPE_DIRECT_CONN_HANDSHAKE_RESULT.
message MsgDirectConnHandshakeResult {
    // The result.
    // If the sender was the server, or not DIRECT_CONN_HANDSHAKE_RESULT_OK, the connection will soon be closed.
    DirectConnHandshakeResult result = 1;
}
